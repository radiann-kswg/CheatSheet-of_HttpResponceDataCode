<!doctype html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>HTTP Status CheatSheet Viewer</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="assets/app.css">
</head>

<body>
	<div class="bg-shape bg-shape-left" aria-hidden="true"></div>
	<div class="bg-shape bg-shape-right" aria-hidden="true"></div>

	<header class="topbar">
		<h1>HTTP Status CheatSheet</h1>
		<p>GitHub Pagesで閲覧できるステータスコードリファレンス</p>
	</header>

	<main class="layout">
		<aside class="sidebar" aria-label="ステータスコード一覧">
			<div class="sidebar-head">
				<label for="search">検索</label>
				<input id="search" type="search" placeholder="例: 404, timeout, cloudflare">
			</div>
			<nav>
				<ul id="doc-list" class="doc-list"></ul>
			</nav>
		</aside>

		<section class="content" aria-live="polite">
			<article id="doc-view" class="doc-view">
				<p>左の一覧からステータスコードを選択してください。</p>
			</article>

			<section class="samples">
				<div class="samples-head">
					<h2>レスポンスサンプル</h2>
					<p>各ページの <code>http</code> コードブロックを抽出して表示します。</p>
				</div>
				<div id="sample-list" class="sample-list">
					<p>サンプルは未選択です。</p>
				</div>
			</section>
		</section>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
	<script src="assets/app.js" defer></script>
</body>

</html>
